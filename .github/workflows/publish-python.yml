name: Publish Python package

on:
  workflow_dispatch:
  push:
    tags:
      - "py-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install Python
        run: uv python install 3.13

      - name: Remove old build artifacts
        run: rm -rf dist

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish
